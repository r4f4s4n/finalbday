<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Final Bday - Intro</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="../assets/favicon/favicon.ico">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
        .container { position: relative; width: 100vw; height: 100vh; }
        video {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            height: 100dvh;
            width: auto;
            z-index: 0;
        }

        #transition-video { display: none; z-index: 10; }

        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; z-index: 5; }
        .btn-start {
            font-family: 'Press Start 2P', cursive;
            padding: 20px 40px;
            background: #ffcc00;
            border: 6px solid #000;
            box-shadow: 8px 8px 0px #8B0000;
            cursor: pointer;
            text-decoration: none;
            color: #000;
            font-size: 24px;
            transition: 0.2s;
        }
        .btn-start:hover { transform: scale(1.1); background: #fff; }
    </style>
</head>
<body>
    <div class="container">
        <video autoplay muted loop playsinline id="bg-video">
            <source src="../assets/videos/video_movil.mp4" media="(max-width: 768px)">
            <source src="../assets/videos/video_escritorio.mp4" media="(min-width: 769px)">
        </video>

        <video id="transition-video" playsinline>
            <source src="../assets/videos/zoom_movil.mp4" media="(max-width: 768px)">
            <source src="../assets/videos/zoom_escritorio.mp4" media="(min-width: 769px)">
        </video>

        <div class="overlay" id="overlay">
            <button class="btn-start" onclick="iniciarTransicion()">START</button>
        </div>
    </div>

    <script>
        function iniciarTransicion() {
            document.getElementById('overlay').style.display = 'none';

            document.getElementById('bg-video').style.display = 'none';
            const transVideo = document.getElementById('transition-video');
            transVideo.style.display = 'block';
            transVideo.play();

            setTimeout(() => {
                window.location.href = 'app_principal.html';
            }, 7000);
        }
    </script>
</body>
</html>
