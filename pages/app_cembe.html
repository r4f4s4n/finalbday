<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CEMBE</title>
    <link rel="icon" type="image/x-icon" href="../assets/favicon/favicon.ico">
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100dvh;
            overflow: hidden;
            background: #000;
            font-family: 'Helvetica', sans-serif;
        }

        .cembe-page {
            position: relative;
            width: 100%;
            height: 100%;
            background-image: url('../assets/favicon/cembebg.png');
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
        }

        .back-btn {
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 30;
            background: #ffcc00;
            color: #000;
            font-weight: 900;
            font-size: 15px;
            border: 4px solid #000;
            border-radius: 6px;
            box-shadow: 4px 4px 0 #000;
            padding: 10px 14px;
            cursor: pointer;
            transition: transform 0.12s ease, box-shadow 0.12s ease;
        }

        .back-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 1px 1px 0 #000;
        }

    </style>
</head>
<body>
    <div class="cembe-page" aria-label="Pantalla CEMBE"></div>

    <button class="back-btn" id="back-btn" type="button" aria-label="Volver atrás">ATRAS</button>

    <script>
        function resolveFallbackUrl() {
            const stored = sessionStorage.getItem('fb-cembe-return-url');
            return stored || '../index.html';
        }

        function goBackToPreviousPage() {
            const fallbackUrl = resolveFallbackUrl();
            if (window.history.length > 1) {
                window.history.back();
                return;
            }
            window.location.href = fallbackUrl;
        }

        document.getElementById('back-btn').addEventListener('click', goBackToPreviousPage);
    </script>
</body>
</html>
