<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CEMBE</title>
    <link rel="icon" type="image/x-icon" href="../assets/favicon/favicon.ico">
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100dvh;
            overflow: hidden;
            background: #000;
            font-family: 'Helvetica', sans-serif;
        }

        .cembe-page {
            position: relative;
            width: 100%;
            height: 100%;
            background-image: url('../assets/favicon/cembebg.png');
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
        }

        .cembe-video-frame {
            position: fixed;
            bottom: 12%;
            right: 8%;
            width: min(320px, 42vw);
            aspect-ratio: 16 / 9;
            z-index: 25;
            border: 5px solid #ffcc00;
            border-radius: 14px;
            overflow: hidden;
            background: rgba(0, 0, 0, 0.88);
            box-shadow: 0 0 0 4px rgba(0, 0, 0, 0.8), 0 0 18px rgba(255, 204, 0, 0.42);
            animation: cembe-video-pulse 1.8s ease-in-out infinite;
            transform-origin: center;
        }

        .cembe-video-viewport {
            position: absolute;
            inset: 0;
            overflow: hidden;
            border-radius: 8px;
        }

        .cembe-video-frame iframe {
            position: absolute;
            top: 50%;
            left: 50%;
            display: block;
            width: calc(100% + 68px);
            height: calc(100% + 68px);
            transform: translate(-50%, -50%);
            border: 0;
        }

        @keyframes cembe-video-pulse {
            0%, 100% {
                transform: scale(1);
                box-shadow: 0 0 0 4px rgba(0, 0, 0, 0.8), 0 0 18px rgba(255, 204, 0, 0.42);
            }
            50% {
                transform: scale(1.05);
                box-shadow: 0 0 0 4px rgba(0, 0, 0, 0.8), 0 0 26px rgba(255, 204, 0, 0.72);
            }
        }

        @media (max-width: 768px) {
            .cembe-video-frame {
                width: min(260px, 66vw);
                right: 6%;
                bottom: 14%;
            }
        }

        .back-btn {
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 30;
            background: #ffcc00;
            color: #000;
            font-weight: 900;
            font-size: 15px;
            border: 4px solid #000;
            border-radius: 6px;
            box-shadow: 4px 4px 0 #000;
            padding: 10px 14px;
            cursor: pointer;
            transition: transform 0.12s ease, box-shadow 0.12s ease;
        }

        .back-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 1px 1px 0 #000;
        }

    </style>
</head>
<body>
    <div class="cembe-page" aria-label="Pantalla CEMBE"></div>

    <div class="cembe-video-frame" aria-label="Video embebido en CEMBE">
        <div class="cembe-video-viewport">
            <iframe
                src="https://drive.google.com/file/d/1ShkPB734Z47w6GLfdvlvwXnfze5Bu6F_/preview"
                title="Video CEMBE"
                allow="autoplay; encrypted-media; picture-in-picture"
                allowfullscreen>
            </iframe>
        </div>
    </div>

    <button class="back-btn" id="back-btn" type="button" aria-label="Volver atrás">ATRAS</button>

    <script>
        function resolveFallbackUrl() {
            const stored = sessionStorage.getItem('fb-cembe-return-url');
            return stored || '../index.html';
        }

        function goBackToPreviousPage() {
            const fallbackUrl = resolveFallbackUrl();
            if (window.history.length > 1) {
                window.history.back();
                return;
            }
            window.location.href = fallbackUrl;
        }

        document.getElementById('back-btn').addEventListener('click', goBackToPreviousPage);
    </script>
</body>
</html>
