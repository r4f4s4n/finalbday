<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script>
        // Ruta legacy: la vista principal ahora se monta desde index.
        if (window.top === window.self && !sessionStorage.getItem('fb-allow-legacy-pages')) {
            window.location.replace('../index.html');
        }
    </script>
    <!-- Carga de estilos de Swiper.js para el slider táctil -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <script>
        if (sessionStorage.getItem('fb-crossfade-to-principal') === '1') {
            document.documentElement.classList.add('crossfade-enter');
        }
    </script>
    
    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100dvh; 
            overflow: hidden; 
            background: #000; 
        }

        html.crossfade-enter body {
            opacity: 0;
        }

        html.crossfade-enter body.is-crossfade-visible {
            opacity: 1;
            transition: opacity 0.65s ease;
        }
        
        .container { 
            position: relative; 
            width: 100vw; 
            height: 100dvh; 
        }
        
        /* Vídeo de fondo general de la app (dos capas superpuestas para crossfade) */
        .bg-video { 
            position: absolute; 
            top: 0; 
            left: 50%; 
            transform: translateX(-50%); 
            height: 100dvh; 
            width: auto; 
            z-index: 0; 
            opacity: 0;
            transition: opacity 0.6s ease;
            pointer-events: none;
        }

        .bg-video.is-active {
            opacity: 1;
            z-index: 1;
        }

        /* PANTALLA DE CARGA RETRO TRANSLÚCIDA */
        .arcade-loader-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100dvh;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(3px);
            -webkit-backdrop-filter: blur(3px);
            z-index: 200;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            transition: opacity 0.5s ease, visibility 0.5s ease;
            pointer-events: all;
        }

        .arcade-loader-text {
            color: #ff00ff;
            font-family: 'Helvetica', sans-serif;
            font-weight: 900;
            font-size: 32px;
            text-shadow: 3px 3px 0px #000, 0 0 10px #ff00ff;
            text-transform: uppercase;
            letter-spacing: 4px;
            animation: arcade-blink 0.8s steps(2, start) infinite;
        }

        @keyframes arcade-blink {
            to { visibility: hidden; }
        }

        /* DESPLEGABLE ARCADE 8-BITS EN LA ESQUINA SUPERIOR IZQUIERDA */
        .arcade-select-container {
            position: absolute;
            top: 15px;
            left: 15px;
            z-index: 30; 
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }

        .arcade-select {
            background: #ff00ff; 
            color: #ffffff;
            font-family: 'Helvetica', sans-serif;
            font-weight: bold;
            font-size: 14px;
            border: 4px solid #000000;
            box-shadow: 4px 4px 0px #000000;
            padding: 8px 12px;
            border-radius: 4px;
            outline: none;
            cursor: pointer;
            text-shadow: 1px 1px 0px #000;
            width: 250px;
        }

        .arcade-select option {
            background: #000000;
            color: #ff00ff;
        }

        /* DADO ARCADE BLANCO EN LA ESQUINA SUPERIOR DERECHA */
        .dice-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 46px;
            height: 46px;
            z-index: 20; 
            background: #ffffff; 
            border: 4px solid #000000; 
            box-shadow: 4px 4px 0px #000000; 
            border-radius: 4px; 
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.1s ease, box-shadow 0.1s ease, opacity 0.5s ease;
            box-sizing: border-box;
            opacity: 0;
            pointer-events: none;
        }

        .dice-btn:active {
            transform: scale(0.9) translate(2px, 2px);
            box-shadow: 1px 1px 0px #000;
        }

        .dice-btn svg {
            width: 24px;
            height: 24px;
        }

        /* Animación de agitación */
        .shake-dice {
            animation: dice-shake 0.5s ease-in-out;
        }

        @keyframes dice-shake {
            0% { transform: rotate(0deg) scale(1); }
            20% { transform: rotate(-20deg) scale(1.1); }
            40% { transform: rotate(25deg) scale(1.1); }
            60% { transform: rotate(-15deg) scale(1.1); }
            80% { transform: rotate(15deg) scale(1.1); }
            100% { transform: rotate(0deg) scale(1); }
        }

        /* CONTENEDOR DEL SWIPER */
        .swiper {
            position: absolute;
            top: 80px;
            left: 0;
            width: 100%;
            height: auto;
            padding: 10px 0; 
            z-index: 2;
            opacity: 0; 
            pointer-events: none; 
            transition: opacity 0.5s ease; 
        }

        /* Cada tarjeta del carrusel */
        .swiper-slide {
            width: 40vw;
            height: 40vw;
            max-width: 350px;
            max-height: 350px;
            min-width: 280px;
            min-height: 280px;
            background: rgba(0, 0, 0, 0.5);
            border: 4px solid #555; 
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            transition: transform 0.3s ease, border-color 0.3s ease;
            box-sizing: border-box;
            overflow: hidden; 
            cursor: pointer;
        }

        /* Solo la tarjeta central/activa tiene el borde animado */
        .swiper-slide-active {
            border: 7px solid #ffcc00;
            animation: border-dance 3s infinite linear;
            transform: scale(1.05); 
        }

        .swiper-slide img,
        .swiper-slide video.custom-media { 
            width: 100%; 
            height: 100%; 
            object-fit: contain; 
            opacity: 88%;
        }

        .winner-badge {
            position: absolute;
            top: 10px;
            left: 10px;
            width: 44px;
            height: 44px;
            z-index: 4;
            pointer-events: none;
        }

        .winner-badge img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            opacity: 1;
            filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.55));
        }

        .slide-zoom-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 42px;
            height: 42px;
            border: 3px solid #000;
            border-radius: 8px;
            background: #ffcc00;
            box-shadow: 3px 3px 0 #000;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            z-index: 6;
            cursor: pointer;
            padding: 0;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            transition: transform 0.12s ease, background 0.12s ease;
        }

        .slide-zoom-btn:hover {
            transform: scale(1.06);
            background: #fff;
        }

        .slide-zoom-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 1px 1px 0 #000;
        }

        .slide-zoom-btn svg {
            width: 22px;
            height: 22px;
            pointer-events: none;
        }

        .media-zoom-overlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 260;
            background: rgba(0, 0, 0, 0.95);
            justify-content: center;
            align-items: center;
            padding: 18px;
            box-sizing: border-box;
        }

        .media-zoom-overlay.is-visible {
            display: flex;
        }

        .media-zoom-content {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .media-zoom-content img,
        .media-zoom-content video {
            max-width: min(96vw, 1600px);
            max-height: 94dvh;
            width: auto;
            height: auto;
            object-fit: contain;
        }

        .media-zoom-close {
            position: fixed;
            top: 14px;
            right: 14px;
            width: 48px;
            height: 48px;
            border: 3px solid #000;
            border-radius: 10px;
            background: #ffcc00;
            box-shadow: 4px 4px 0 #000;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            z-index: 262;
            cursor: pointer;
            padding: 0;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            transition: transform 0.12s ease, background 0.12s ease;
        }

        .media-zoom-close:hover {
            transform: scale(1.06);
            background: #fff;
        }

        .media-zoom-close:active {
            transform: translate(2px, 2px);
            box-shadow: 1px 1px 0 #000;
        }

        .media-zoom-close svg {
            width: 24px;
            height: 24px;
            pointer-events: none;
        }

        /* CONTENEDORES LED COMPLETO */
        .marquee-container {
            position: absolute;
            bottom: 0;
            width: 100%;
            overflow: hidden;
            background: #000;
            z-index: 2;
            height: 40px;
            opacity: 80%;
            display: flex; 
        }

        /* Ocultamos el letrero LED en las tarjetas laterales */
        .swiper-slide:not(.swiper-slide-active) .marquee-container {
            display: none;
        }

        .marquee-text {
            display: inline-flex;
            white-space: nowrap; 
            animation: marquee infinite 8s linear; 
            font-family: 'Helvetica', sans-serif;
            color: #ff0505;
            font-size: 25px;
            z-index: 5;
            position: relative;
            align-items: center;
            height: 100%;
        }

        .marquee-text span {
            margin-inline: 12px; 
        }
        
        .crt-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
            background: linear-gradient(
                rgba(18, 16, 16, 0) 50%, 
                rgba(0, 0, 0, 0.5) 50%
            );
            background-size: 100% 4px;
        }
        
        @keyframes marquee {
            0% { transform: translate3d(0, 0, 0); }
            100% { transform: translate3d(-100%, 0, 0); }
        }

        @keyframes border-dance {
            0% { border-color: #ffcc00; }
            50% { border-color: #ff00ff; }
            100% { border-color: #ffcc00; }
        }

        /* VISTA GRID DE MINIATURAS */
        .grid-view {
            display: none; 
            position: absolute;
            top: 80px;
            left: 5%;
            width: 90%;
            height: calc(100dvh - 120px);
            overflow-y: auto;
            z-index: 15;
            background: rgba(0, 0, 0, 0.85);
            border: 4px solid #ff00ff;
            box-sizing: border-box;
            padding: 15px;
            border-radius: 6px;
            box-shadow: 0px 0px 15px #ff00ff;
        }

        .grid-view::-webkit-scrollbar {
            width: 6px;
        }
        .grid-view::-webkit-scrollbar-thumb {
            background: #ffcc00;
            border-radius: 4px;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(70px, 1fr));
            gap: 12px;
            justify-content: center;
        }

        .grid-item {
            aspect-ratio: 1 / 1;
            background: rgba(0,0,0,0.6);
            border: 3px solid #ffcc00;
            box-shadow: 2px 2px 0px #000;
            border-radius: 4px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            cursor: pointer;
            box-sizing: border-box;
            transition: transform 0.1s ease, border-color 0.1s;
        }

        .grid-item:hover, .grid-item:active {
            border-color: #ff00ff;
            transform: scale(1.1);
        }

        .grid-item img,
        .grid-item video {
            width: 100%;
            height: 100%;
            object-fit: cover; 
        }

        /* DIALOG DE CONFIRMACIÓN ESTILO STREET FIGHTER 8-BIT */
        .arcade-dialog-overlay {
            display: none; 
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100dvh;
            background: rgba(0, 0, 0, 0.85);
            z-index: 100; 
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
        }

        .arcade-dialog-box {
            background: #111111;
            border: 6px double #ff00ff; 
            box-shadow: 0 0 25px #ff00ff, inset 0 0 10px #ff00ff;
            padding: 30px 20px;
            width: 85%;
            max-width: 400px;
            text-align: center;
            box-sizing: border-box;
            border-radius: 4px;
            animation: dialog-pop 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes dialog-pop {
            from { transform: scale(0.7); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .arcade-dialog-text {
            color: #ffffff;
            font-family: 'Helvetica', sans-serif;
            font-size: 18px;
            font-weight: bold;
            line-height: 1.5;
            margin: 0 0 30px 0;
            text-shadow: 2px 2px 0px #000000;
            text-transform: uppercase; 
        }

        .arcade-dialog-text span {
            color: #ffcc00; 
            text-shadow: 2px 2px 0px #000000;
        }

        .arcade-dialog-buttons {
            display: flex;
            justify-content: space-around;
            gap: 20px;
        }

        .arcade-btn {
            flex: 1;
            padding: 12px 20px;
            font-family: 'Helvetica', sans-serif;
            font-weight: bold;
            font-size: 18px;
            border: 4px solid #000000;
            border-radius: 4px;
            cursor: pointer;
            box-shadow: 4px 4px 0px #000000;
            transition: transform 0.1s, box-shadow 0.1s;
            text-transform: uppercase;
        }

        .arcade-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 1px 1px 0px #000000;
        }

        .btn-no {
            background: #ff0505; 
            color: #ffffff;
            text-shadow: 1px 1px 0px #000;
        }

        .btn-yes {
            background: #00ff00;
            color: #000000;
        }

        /* PANTALLA DE ÉXTASIS / CONFIRMACIÓN FINAL */
        .final-screen-overlay {
            display: none; 
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100dvh;
            z-index: 90;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
            padding: 20px;
            animation: dialog-pop 0.4s ease;
        }

        .arcade-back-container {
            position: absolute;
            top: 15px;
            left: 15px;
            z-index: 95;
        }

        .arcade-back-btn {
            background: #ffcc00;
            color: #000000;
            font-family: 'Helvetica', sans-serif;
            font-weight: bold;
            font-size: 14px;
            border: 4px solid #000000;
            box-shadow: 4px 4px 0px #000000;
            padding: 8px 12px;
            border-radius: 4px;
            outline: none;
            cursor: pointer;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .arcade-back-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 1px 1px 0px #000000;
        }

        .final-text-box {
            background: #111111;
            border: 6px double #00ff00; 
            box-shadow: 0 0 25px #00ff00, inset 0 0 10px #00ff00;
            padding: 25px;
            width: 90%;
            max-width: 450px;
            text-align: center;
            box-sizing: border-box;
            border-radius: 4px;
            color: #ffffff;
            font-family: 'Helvetica', sans-serif;
            font-weight: bold;
            font-size: 16px;
            line-height: 1.6;
            text-shadow: 2px 2px 0px #000000;
            text-transform: uppercase;
            margin-bottom: 0;
            opacity: 0;
            transition: opacity 0.8s ease;
        }

        .final-text-box.is-visible {
            opacity: 1;
        }

        .final-text-box span.highlight {
            color: #ffcc00;
        }

        .final-text-box span.iban {
            color: #ff00ff;
            display: block;
            margin-top: 10px;
            font-size: 18px;
            letter-spacing: 1px;
            background: #000;
            padding: 6px;
            border: 2px dashed #ff00ff;
        }

        /* Contenedor miniatura del disfraz seleccionado */
        .final-preview-container {
            width: 140px;
            height: 140px;
            background: #000;
            border: 4px solid #ffcc00;
            box-shadow: 4px 4px 0px #000000, 0 0 15px #ffcc00;
            border-radius: 4px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            box-sizing: border-box;
            opacity: 0;
            transition: opacity 0.8s ease;
        }

        .final-preview-container.is-visible {
            opacity: 1;
        }

        .final-preview-container img,
        .final-preview-container video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .cembe-nav-btn {
            --cembe-angle: 0deg;
            position: fixed;
            left: 16px;
            bottom: 16px;
            width: 84px;
            height: 84px;
            z-index: 250;
            user-select: none;
            filter: drop-shadow(3px 3px 0 rgba(0, 0, 0, 0.75));
            border: 4px solid rgba(255, 255, 255, 0.24);
            border-radius: 14px;
            background: rgba(0, 0, 0, 0.55);
            padding: 8px;
            cursor: pointer;
            position: fixed;
            overflow: visible;
            animation: cembe-float 2.2s ease-in-out infinite;
            transition: left 1.3s cubic-bezier(0.25, 0.8, 0.25, 1), bottom 1.3s cubic-bezier(0.25, 0.8, 0.25, 1), transform 1.3s cubic-bezier(0.25, 0.8, 0.25, 1), border-color 0.16s ease, box-shadow 0.16s ease, background 0.16s ease, filter 0.16s ease;
            box-shadow: 0 0 0 0 rgba(255, 204, 0, 0);
        }

        .cembe-nav-btn::before {
            content: '';
            position: absolute;
            inset: -6px;
            border-radius: 18px;
            padding: 4px;
            background: conic-gradient(
                from var(--cembe-angle),
                #ff2d55,
                #ff9500,
                #ffd60a,
                #32d74b,
                #0a84ff,
                #bf5af2,
                #ff2d55
            );
            -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            opacity: 0;
            pointer-events: none;
        }

        .cembe-nav-btn:hover,
        .cembe-nav-btn:focus-visible {
            transform: scale(1.08);
            border-color: rgba(255, 204, 0, 0.92);
            background: rgba(20, 20, 20, 0.8);
            box-shadow: 0 0 0 4px rgba(255, 204, 0, 0.18);
            outline: none;
            animation-play-state: paused;
        }

        .cembe-nav-btn:active {
            transform: scale(1.02);
            border-color: rgba(255, 255, 255, 0.92);
        }

        .cembe-nav-btn.is-launching {
            animation: none;
            left: 50%;
            bottom: 50%;
            transform: translate(-50%, 50%) scale(1.35);
            filter: drop-shadow(0 0 14px rgba(255, 230, 120, 0.95));
            border-color: rgba(255, 255, 255, 0.9);
        }

        .cembe-nav-btn.is-launching::before {
            opacity: 1;
            animation: cembe-rainbow-shift 0.7s linear infinite;
        }

        .cembe-nav-btn img {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: contain;
            image-rendering: pixelated;
        }

        @keyframes cembe-float {
            0% { transform: translateY(0); }
            50% { transform: translateY(-3px); }
            100% { transform: translateY(0); }
        }

        @keyframes cembe-rainbow-shift {
            from { --cembe-angle: 0deg; }
            to { --cembe-angle: 360deg; }
        }

        @property --cembe-angle {
            syntax: '<angle>';
            inherits: false;
            initial-value: 0deg;
        }
    </style>
</head>
<body>
    <div class="container">
        <div data-component="controls"></div>
        <div data-component="media-shell"></div>
        <div data-component="confirm-dialog"></div>
        <div data-component="final-screen"></div>
    </div>

    <button class="cembe-nav-btn" id="cembe-nav-button" type="button" aria-label="Abrir CEMBE">
        <img src="../assets/favicon/cembeicon.png" alt="">
    </button>

    <!-- Script de Swiper.js -->
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="../components/loader.js"></script>

    <script src="../assets/js/principal-back-guard.js"></script>
    <script src="../assets/js/principal-customs-data.js"></script>
    <script src="../assets/js/principal-bg-video.js"></script>
    <script src="../assets/js/principal-app.js"></script>
    <script>
        function resetCembeNavButtonState() {
            const cembeNavButton = document.getElementById('cembe-nav-button');
            if (!cembeNavButton) return;

            cembeNavButton.classList.remove('is-launching');
            cembeNavButton.removeAttribute('aria-disabled');
        }

        function openCembePage() {
            const cembeNavButton = document.getElementById('cembe-nav-button');
            if (cembeNavButton && cembeNavButton.classList.contains('is-launching')) {
                return;
            }

            const currentPath = window.location.pathname + window.location.search + window.location.hash;
            sessionStorage.setItem('fb-cembe-return-url', currentPath);
            if (window.FinalBdayBackGuard && typeof window.FinalBdayBackGuard.allowNextUnload === 'function') {
                window.FinalBdayBackGuard.allowNextUnload();
            }

            if (cembeNavButton) {
                cembeNavButton.classList.add('is-launching');
                cembeNavButton.setAttribute('aria-disabled', 'true');
            }

            setTimeout(() => {
                window.location.href = 'app_cembe.html';
            }, 2000);
        }

        window.addEventListener('DOMContentLoaded', () => {
            const cembeNavButton = document.getElementById('cembe-nav-button');
            if (cembeNavButton) {
                cembeNavButton.addEventListener('click', openCembePage);
            }
            resetCembeNavButtonState();
            window.FinalBdayPrincipalApp.init();
        });

        window.addEventListener('pageshow', resetCembeNavButtonState);
    </script>
</body>
</html>
