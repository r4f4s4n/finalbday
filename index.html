<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Final Bday</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="assets/favicon/favicon.ico">
    <style>
        :root {
            --bg-a: #07070f;
            --bg-b: #1a0a2b;
            --ink: #f4efe1;
            --accent: #ffcc00;
            --accent-2: #ff00ff;
            --frame: #000000;
        }

        * { box-sizing: border-box; }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            color: var(--ink);
            font-family: 'VT323', monospace;
        }

        .loader-page {
            position: fixed;
            inset: 0;
            display: grid;
            place-items: center;
            padding: 24px;
            background:
                radial-gradient(circle at 20% 20%, rgba(255, 204, 0, 0.2), transparent 40%),
                radial-gradient(circle at 80% 0%, rgba(0, 224, 255, 0.25), transparent 35%),
                linear-gradient(140deg, var(--bg-a), var(--bg-b));
            z-index: 200;
            opacity: 1;
            transition: opacity 0.5s ease;
        }

        .loader-page.is-hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loader-card {
            width: min(700px, 100%);
            border: 6px solid var(--frame);
            background: rgba(0, 0, 0, 0.75);
            box-shadow: 10px 10px 0 #000;
            padding: 20px;
        }

        h1 {
            margin: 0 0 12px;
            font-family: 'Press Start 2P', cursive;
            font-size: clamp(20px, 4.2vw, 34px);
            line-height: 1.35;
            color: var(--accent);
            text-align: center;
        }

        p {
            margin: 0 0 18px;
            font-size: clamp(22px, 3.4vw, 30px);
            letter-spacing: 0.8px;
        }

        .progress-wrap {
            width: 100%;
            height: 22px;
            border: 4px solid #000;
            background: #211036;
            box-shadow: inset 0 0 0 2px rgba(0, 0, 0, 0.4);
            overflow: hidden;
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--accent-2));
            transition: width 0.2s ease;
        }

        .meta {
            margin-top: 14px;
            display: flex;
            justify-content: space-between;
            gap: 12px;
            font-size: clamp(22px, 3vw, 28px);
        }

        .status {
            margin-top: 10px;
            min-height: 28px;
            font-size: clamp(20px, 2.8vw, 26px);
            opacity: 0.95;
            text-align: center;
        }

        .error {
            color: #ff9f9f;
        }

        .app-shell {
            position: fixed;
            inset: 0;
            z-index: 10;
            background: #000;
        }

        .view {
            position: absolute;
            inset: 0;
            opacity: 0;
            transition: opacity 0.75s ease;
            pointer-events: none;
        }

        .view.is-active {
            opacity: 1;
            pointer-events: auto;
        }

        .intro-container {
            position: relative;
            width: 100vw;
            height: 100dvh;
            overflow: hidden;
            background: #000;
        }

        .intro-container video {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            height: 100dvh;
            width: auto;
            z-index: 0;
        }

        #intro-transition-video { display: none; z-index: 10; }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 12;
        }

        .btn-start {
            font-family: 'Press Start 2P', cursive;
            padding: 20px 40px;
            background: #ffcc00;
            border: 6px solid #000;
            box-shadow: 8px 8px 0 #8b0000;
            cursor: pointer;
            color: #000;
            font-size: 24px;
            transition: 0.2s;
        }

        .btn-start:hover { transform: scale(1.1); background: #fff; }

        .principal-root {
            width: 100%;
            height: 100%;
            position: relative;
            background: #000;
        }
    </style>
</head>
<body>
    <main class="loader-page" id="loader-page">
        <section class="loader-card" aria-label="Pantalla de carga">
            <h1>FINAL: EL CUMPLE</h1>

            <div class="progress-wrap" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" aria-label="Progreso de carga">
                <div class="progress-fill" id="progress-fill"></div>
            </div>

            <div class="meta">
                <div id="progress-text">0%</div>
                <div id="progress-count">0 / 0</div>
            </div>

            <div class="status" id="status-text">Preparando manifiesto...</div>
        </section>
    </main>

    <div class="app-shell" id="app-shell" aria-live="polite">
        <section class="view" id="intro-view" aria-label="Intro">
            <div class="intro-container">
                <video autoplay muted loop playsinline id="intro-bg-video">
                    <source data-asset-original-src="assets/videos/video_movil.mp4" media="(max-width: 768px)">
                    <source data-asset-original-src="assets/videos/video_escritorio.mp4" media="(min-width: 769px)">
                </video>

                <video id="intro-transition-video" playsinline muted>
                    <source data-asset-original-src="assets/videos/zoom_movil.mp4" media="(max-width: 768px)">
                    <source data-asset-original-src="assets/videos/zoom_escritorio.mp4" media="(min-width: 769px)">
                </video>

                <div class="overlay" id="intro-overlay">
                    <button class="btn-start" id="btn-start" type="button">START</button>
                </div>
            </div>
        </section>

        <section class="view" id="principal-view" aria-label="Principal">
            <div class="principal-root">
                <div class="container">
                    <div data-component="controls"></div>
                    <div data-component="media-shell"></div>
                    <div data-component="confirm-dialog"></div>
                    <div data-component="final-screen"></div>
                </div>
            </div>
        </section>
    </div>

    <audio id="global-bg-music" preload="auto" loop>
        <source data-asset-original-src="assets/videos/interior_student_cafe.mp3" type="audio/mpeg">
    </audio>
    <audio id="intro-bg-birds" preload="auto" loop>
        <source data-asset-original-src="assets/videos/aves_16.mp3" type="audio/mpeg">
    </audio>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        const progressFill = document.getElementById('progress-fill');
        const progressText = document.getElementById('progress-text');
        const progressCount = document.getElementById('progress-count');
        const statusText = document.getElementById('status-text');
        const loaderPage = document.getElementById('loader-page');
        const introView = document.getElementById('intro-view');
        const principalView = document.getElementById('principal-view');
        const introOverlay = document.getElementById('intro-overlay');
        const introBgVideo = document.getElementById('intro-bg-video');
        const introTransitionVideo = document.getElementById('intro-transition-video');
        const globalBgMusic = document.getElementById('global-bg-music');
        const introBgBirds = document.getElementById('intro-bg-birds');
        const btnStart = document.getElementById('btn-start');

        let principalInitPromise = null;
        let principalAppReady = false;
        let appReady = false;
        let startMusicTimeoutId = null;
        const PRELOAD_TIMEOUT_MS = 25000;
        const POST_LOAD_WAIT_MS = 10000;
        const FAILED_PRELOAD_RETRY_MS = 15000;
        const retainedPreloadedResources = new Map();
        const failedPreloadResources = new Map();
        let failedPreloadRetryTimerId = null;

        function toAbsoluteResourceUrl(url) {
            return new URL(url, location.href).href;
        }

        function isBlobBackedAsset(pathname) {
            return (
                pathname.endsWith('.png') ||
                pathname.endsWith('.jpg') ||
                pathname.endsWith('.jpeg') ||
                pathname.endsWith('.gif') ||
                pathname.endsWith('.webp') ||
                pathname.endsWith('.ico') ||
                pathname.endsWith('.mp4') ||
                pathname.endsWith('.webm') ||
                pathname.endsWith('.ogg') ||
                pathname.endsWith('.mp3') ||
                pathname.endsWith('.wav') ||
                pathname.endsWith('.m4a')
            );
        }

        function getCachedResolvedUrl(url) {
            const absoluteUrl = toAbsoluteResourceUrl(url);
            const cachedEntry = retainedPreloadedResources.get(absoluteUrl);
            return cachedEntry && cachedEntry.objectUrl ? cachedEntry.objectUrl : absoluteUrl;
        }

        function getCachedText(url) {
            const absoluteUrl = toAbsoluteResourceUrl(url);
            const cachedEntry = retainedPreloadedResources.get(absoluteUrl);
            return cachedEntry && typeof cachedEntry.text === 'string' ? cachedEntry.text : '';
        }

        function rememberFailedPreload(url, errorMessage) {
            const absoluteUrl = toAbsoluteResourceUrl(url);
            const previous = failedPreloadResources.get(absoluteUrl);
            failedPreloadResources.set(absoluteUrl, {
                attempts: previous ? previous.attempts + 1 : 1,
                lastError: errorMessage || 'Error desconocido',
                lastAttemptAt: Date.now()
            });
            scheduleFailedPreloadRetry();
        }

        function clearFailedPreload(url) {
            failedPreloadResources.delete(toAbsoluteResourceUrl(url));
        }

        function setElementAssetSource(element, url) {
            if (!element || !url) return;

            const absoluteUrl = toAbsoluteResourceUrl(url);
            const resolvedUrl = getCachedResolvedUrl(absoluteUrl);
            const currentOriginal = element.getAttribute('data-asset-original-src');
            const currentResolved = element.getAttribute('src') || '';

            if (currentOriginal === absoluteUrl && currentResolved === resolvedUrl) {
                return;
            }

            element.setAttribute('data-asset-original-src', absoluteUrl);
            element.setAttribute('src', resolvedUrl);
        }

        function hydrateSourceChildren(mediaEl) {
            const sourceEls = mediaEl.querySelectorAll('source[src], source[data-asset-original-src]');
            let hasChanges = false;

            sourceEls.forEach((sourceEl) => {
                const originalAttr = sourceEl.getAttribute('data-asset-original-src') || sourceEl.getAttribute('src');
                if (!originalAttr) return;

                const absoluteUrl = toAbsoluteResourceUrl(originalAttr);
                const resolvedUrl = getCachedResolvedUrl(absoluteUrl);
                if (sourceEl.getAttribute('src') === resolvedUrl && sourceEl.getAttribute('data-asset-original-src') === absoluteUrl) {
                    return;
                }

                sourceEl.setAttribute('data-asset-original-src', absoluteUrl);
                sourceEl.setAttribute('src', resolvedUrl);
                hasChanges = true;
            });

            if (hasChanges && typeof mediaEl.load === 'function') {
                mediaEl.load();
            }
        }

        function hydrateExistingMediaTree(root) {
            const scope = root || document;

            scope.querySelectorAll('img[src]').forEach((imgEl) => {
                const originalAttr = imgEl.getAttribute('data-asset-original-src') || imgEl.getAttribute('src');
                if (!originalAttr) return;
                setElementAssetSource(imgEl, originalAttr);
            });

            scope.querySelectorAll('video, audio').forEach((mediaEl) => {
                const directSrc = mediaEl.getAttribute('data-asset-original-src') || mediaEl.getAttribute('src');
                if (directSrc) {
                    const beforeSrc = mediaEl.getAttribute('src') || '';
                    setElementAssetSource(mediaEl, directSrc);
                    if ((mediaEl.getAttribute('src') || '') !== beforeSrc && typeof mediaEl.load === 'function') {
                        mediaEl.load();
                    }
                }

                hydrateSourceChildren(mediaEl);
            });

            scope.querySelectorAll('source[src], source[data-asset-original-src]').forEach((sourceEl) => {
                const originalAttr = sourceEl.getAttribute('data-asset-original-src') || sourceEl.getAttribute('src');
                if (!originalAttr) return;

                const absoluteUrl = toAbsoluteResourceUrl(originalAttr);
                const resolvedUrl = getCachedResolvedUrl(absoluteUrl);

                if (sourceEl.getAttribute('src') !== resolvedUrl) {
                    sourceEl.setAttribute('src', resolvedUrl);
                }

                if (!sourceEl.getAttribute('data-asset-original-src')) {
                    sourceEl.setAttribute('data-asset-original-src', absoluteUrl);
                }
            });
        }


        async function fetchResourceBlob(url, timeoutMs) {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), timeoutMs);

            try {
                const response = await fetch(url, {
                    cache: 'no-store',
                    signal: controller.signal
                });

                if (!response.ok) {
                    throw new Error('HTTP ' + response.status);
                }

                return await response.blob();
            } finally {
                clearTimeout(timeoutId);
            }
        }

        async function retryFailedPreloads() {
            failedPreloadRetryTimerId = null;

            const failedUrls = Array.from(failedPreloadResources.keys());
            for (const url of failedUrls) {
                try {
                    const loaded = await preloadResource(url, { isRetry: true });
                    if (loaded) {
                        hydrateExistingMediaTree(document);
                    }
                } catch (error) {
                    console.warn('Reintento de precarga fallido:', url, error);
                }
            }

            if (failedPreloadResources.size > 0) {
                scheduleFailedPreloadRetry();
            }
        }

        function scheduleFailedPreloadRetry() {
            if (failedPreloadRetryTimerId !== null) {
                return;
            }

            failedPreloadRetryTimerId = setTimeout(() => {
                retryFailedPreloads().catch((error) => {
                    console.warn('No se pudo reintentar la precarga fallida:', error);
                    failedPreloadRetryTimerId = null;
                    if (failedPreloadResources.size > 0) {
                        scheduleFailedPreloadRetry();
                    }
                });
            }, FAILED_PRELOAD_RETRY_MS);
        }

        window.FinalBdayAssetCache = {
            has(url) {
                return retainedPreloadedResources.has(toAbsoluteResourceUrl(url));
            },
            get(url) {
                return retainedPreloadedResources.get(toAbsoluteResourceUrl(url)) || null;
            },
            resolve(url) {
                return getCachedResolvedUrl(url);
            },
            getText(url) {
                return getCachedText(url);
            },
            setElementSource(element, url) {
                setElementAssetSource(element, url);
            },
            hydrateExistingMedia(root) {
                hydrateExistingMediaTree(root);
            },
            getFailedResources() {
                return Array.from(failedPreloadResources.entries()).map(([url, meta]) => ({
                    url: url,
                    attempts: meta.attempts,
                    lastError: meta.lastError,
                    lastAttemptAt: meta.lastAttemptAt
                }));
            },
            retryFailed() {
                return retryFailedPreloads();
            }
        };

        function updateProgress(done, total, statusMessage) {
            const safeDone = Math.max(0, done);
            const safeTotal = total > 0 ? total : 1;
            const percent = Math.max(0, Math.min(100, Math.round((safeDone / safeTotal) * 100)));
            progressFill.style.width = percent + '%';
            progressText.textContent = percent + '%';
            const visibleDone = Math.max(0, Math.min(121, done - 17));
            const visibleTotal = Math.max(0, Math.min(121, total - 17));
            progressCount.textContent = visibleDone + ' / ' + visibleTotal;
            if (statusMessage) {
                statusText.textContent = statusMessage;
            }
            const progressbar = document.querySelector('.progress-wrap');
            progressbar.setAttribute('aria-valuenow', String(percent));
        }

        function startGlobalBackgroundMusic() {
            if (!globalBgMusic) return;
            globalBgMusic.loop = true;
            globalBgMusic.volume = 1;
            globalBgMusic.play().then(() => {
                if (!introBgBirds) return;
                if (stopIntroBirdsTimeoutId !== null) {
                    clearTimeout(stopIntroBirdsTimeoutId);
                }
                stopIntroBirdsTimeoutId = setTimeout(() => {
                    introBgBirds.pause();
                    introBgBirds.currentTime = 0;
                    stopIntroBirdsTimeoutId = null;
                }, 1000);
            }).catch(() => {
                // Si el navegador bloquea la reproducción automática, se
                // volverá a intentar tras la interacción del usuario.
            });
        }

        function waitMs(ms) {
            return new Promise((resolve) => setTimeout(resolve, Math.max(0, ms)));
        }

        function isCustomAssetUrl(url) {
            try {
                const parsed = new URL(url, location.href);
                return parsed.pathname.indexOf('/assets/customs/') !== -1;
            } catch (error) {
                return false;
            }
        }

        function isFaviconAssetUrl(url) {
            try {
                const parsed = new URL(url, location.href);
                return parsed.pathname.indexOf('/assets/favicon/') !== -1;
            } catch (error) {
                return false;
            }
        }

        function isVideoAssetUrl(url) {
            try {
                const parsed = new URL(url, location.href);
                return parsed.pathname.indexOf('/assets/videos/') !== -1;
            } catch (error) {
                return false;
            }
        }

        function isValidResourcePath(path) {
            if (!path) return false;
            if (path.startsWith('data:')) return false;
            if (path.startsWith('javascript:')) return false;
            if (path.startsWith('#')) return false;
            return true;
        }

        function extractResourceUrls(text, baseUrl) {
            const urls = new Set();
            const attrRegex = /(src|href)=["']([^"']+)["']/gi;
            const assetRegex = /["'](\.\.\/assets\/[^"']+)["']/gi;
            const componentRegex = /["'](\.\.\/components\/[^"']+)["']/gi;

            let match;
            while ((match = attrRegex.exec(text)) !== null) {
                const raw = match[2].trim();
                if (!isValidResourcePath(raw)) continue;
                if (raw.indexOf('${') !== -1) continue;
                urls.add(new URL(raw, baseUrl).href);
            }

            while ((match = assetRegex.exec(text)) !== null) {
                const rawAsset = match[1].trim();
                if (rawAsset.indexOf('${') !== -1) continue;
                urls.add(new URL(rawAsset, baseUrl).href);
            }

            while ((match = componentRegex.exec(text)) !== null) {
                const rawComponent = match[1].trim();
                if (rawComponent.indexOf('${') !== -1) continue;
                urls.add(new URL(rawComponent, baseUrl).href);
            }

            return urls;
        }

        async function discoverResources() {
            const pages = [
                'pages/app_intro.html',
                'pages/app_principal.html'
            ];

            const resources = new Set([
                new URL('assets/videos/aves_16.mp3', location.href).href,
                new URL('assets/favicon/favicon.ico', location.href).href,
                new URL('components/loader.js', location.href).href,
                new URL('components/app-controls.html', location.href).href,
                new URL('components/app-media-shell.html', location.href).href,
                new URL('components/app-confirm-dialog.html', location.href).href,
                new URL('components/app-final-screen.html', location.href).href,
                new URL('assets/videos/video_movil.mp4', location.href).href,
                new URL('assets/videos/video_escritorio.mp4', location.href).href,
                new URL('assets/videos/zoom_movil.mp4', location.href).href,
                new URL('assets/videos/zoom_escritorio.mp4', location.href).href,
                new URL('assets/videos/interior_student_cafe.mp3', location.href).href,
                new URL('pages/app_principal.html', location.href).href
            ]);

            for (const pagePath of pages) {
                const pageUrl = new URL(pagePath, location.href);
                const response = await fetch(pageUrl.href, { cache: 'no-store' });
                if (!response.ok) {
                    throw new Error('No se pudo leer ' + pagePath + ' (' + response.status + ')');
                }

                const text = await response.text();
                const found = extractResourceUrls(text, pageUrl.href);
                for (const url of found) {
                    resources.add(url);
                }

                if (pagePath === 'pages/app_principal.html') {
                    // Los archivos de customs ahora viven en el módulo
                    // principal-customs-data.js (ya cargado como <script>).
                    // Usamos la API directamente en lugar de parsear el HTML.
                    if (window.FinalBdayCustomsData && typeof window.FinalBdayCustomsData.getData === 'function') {
                        const customsData = window.FinalBdayCustomsData.getData();
                        for (const item of Object.values(customsData)) {
                            if (item.file) {
                                resources.add(new URL('assets/customs/' + item.file, location.href).href);
                            }
                        }
                    }

                    // Videos de fondo del principal: ya no están inline en el
                    // HTML, así que los añadimos explícitamente.
                    const bgVideos = [
                        'assets/videos/disco_movil.mp4',
                        'assets/videos/bar1-movil.mp4',
                        'assets/videos/bar2-movil.mp4'
                    ];
                    for (const v of bgVideos) {
                        resources.add(new URL(v, location.href).href);
                    }
                }
            }

            const sameOriginResources = [];
            for (const url of resources) {
                try {
                    const parsed = new URL(url);
                    if (parsed.origin === location.origin) {
                        if (parsed.href.indexOf('${') !== -1 || parsed.href.indexOf('%7B') !== -1) {
                            continue;
                        }
                        sameOriginResources.push(parsed.href);
                    }
                } catch (e) {
                    console.warn('URL ignorada:', url, e);
                }
            }

            return sameOriginResources;
        }

        async function preloadAppResources(options) {
            const cfg = options || {};
            const resources = await discoverResources();
            const faviconResources = resources.filter((url) => isFaviconAssetUrl(url));
            const videoResources = resources.filter((url) => isVideoAssetUrl(url));
            const customResources = resources.filter((url) => isCustomAssetUrl(url));
            const otherResources = resources.filter((url) => {
                return !isFaviconAssetUrl(url) && !isVideoAssetUrl(url) && !isCustomAssetUrl(url);
            });

            await preloadAllResources(faviconResources, cfg);

            const introBirdsUrl = new URL('assets/videos/aves_16.mp3', location.href).href;
            const orderedVideoResources = videoResources.slice().sort((left, right) => {
                if (left === introBirdsUrl) return -1;
                if (right === introBirdsUrl) return 1;
                return 0;
            });

            await preloadAllResources(orderedVideoResources, {
                ...cfg,
                onResourceLoaded: (url) => {
                    if (url === introBirdsUrl) {
                        window.FinalBdayAssetCache.hydrateExistingMedia(document);
                        introAudio.startIntroBirdsMusic();
                    }
                }
            });

            await preloadAllResources(otherResources, cfg);
            await preloadAllResources(customResources, cfg);

            await initPrincipalApp();

            window.FinalBdayAssetCache.hydrateExistingMedia(document);
        }

        async function preloadResource(url, options) {
            const absoluteUrl = toAbsoluteResourceUrl(url);
            if (retainedPreloadedResources.has(absoluteUrl)) {
                return true;
            }

            const parsed = new URL(absoluteUrl);
            const pathname = parsed.pathname.toLowerCase();

            try {
                if (isBlobBackedAsset(pathname)) {
                    const blob = await fetchResourceBlob(absoluteUrl, PRELOAD_TIMEOUT_MS);
                    const objectUrl = URL.createObjectURL(blob);

                    retainedPreloadedResources.set(absoluteUrl, {
                        absoluteUrl: absoluteUrl,
                        kind: 'binary',
                        objectUrl: objectUrl
                    });
                    clearFailedPreload(absoluteUrl);
                    return true;
                }

                const response = await fetch(absoluteUrl, { cache: 'no-store' });
                if (!response.ok) {
                    throw new Error('HTTP ' + response.status);
                }

                const text = await response.text();
                retainedPreloadedResources.set(absoluteUrl, {
                    absoluteUrl: absoluteUrl,
                    text: text,
                    kind: 'text'
                });
                clearFailedPreload(absoluteUrl);
                return true;
            } catch (error) {
                const message = error && error.name === 'AbortError'
                    ? 'Timeout de precarga'
                    : (error && error.message) || 'Error de precarga';
                rememberFailedPreload(absoluteUrl, message);

                if (!options || !options.isRetry) {
                    console.warn('Precarga fallida:', absoluteUrl, message);
                }

                return false;
            }
        }

        async function preloadAllResources(resourceUrls, options) {
            const cfg = options || {};
            const maxConcurrent = 3;
            let index = 0;

            async function worker() {
                while (index < resourceUrls.length) {
                    const currentIndex = index;
                    index += 1;
                    const url = resourceUrls[currentIndex];

                    try {
                        const loaded = await preloadResource(url);

                        if (loaded && typeof cfg.onResourceLoaded === 'function') {
                            cfg.onResourceLoaded(url);
                        }

                        if (loaded && isCustomAssetUrl(url) && typeof cfg.onCustomLoaded === 'function') {
                            cfg.onCustomLoaded(url);
                        }
                    } catch (error) {
                        console.warn('Error de precarga:', url, error);
                    }
                }
            }

            const workers = [];
            const workerCount = Math.min(maxConcurrent, resourceUrls.length);
            for (let i = 0; i < workerCount; i++) {
                workers.push(worker());
            }

            await Promise.all(workers);
        }

        function extractPrincipalStyle(pageHtml) {
            const styleMatch = pageHtml.match(/<style>([\s\S]*?)<\/style>/i);
            if (!styleMatch) return '';
            return styleMatch[1];
        }

        function extractPrincipalInlineScript(pageHtml) {
            const scriptMatches = pageHtml.match(/<script>([\s\S]*?)<\/script>/gi) || [];
            for (let i = scriptMatches.length - 1; i >= 0; i--) {
                const content = scriptMatches[i]
                    .replace(/^<script>/i, '')
                    .replace(/<\/script>$/i, '');
                if (content.indexOf('customsData') !== -1) {
                    return content;
                }
            }
            return '';
        }

        function transformPrincipalScript(script) {
            let transformed = script;

            transformed = transformed.replace(/\.\.\/assets\//g, 'assets/');
            transformed = transformed.replace(
                /window\.addEventListener\('DOMContentLoaded',\s*async\s*\(\)\s*=>\s*\{/,
                'return (async () => {'
            );

            const lastClose = transformed.lastIndexOf('});');
            if (lastClose !== -1) {
                transformed = transformed.slice(0, lastClose) + '})();' + transformed.slice(lastClose + 3);
            }

            return transformed;
        }

        async function initPrincipalApp() {
            if (principalInitPromise) return principalInitPromise;

            principalInitPromise = (async () => {
                const cachedPageHtml = window.FinalBdayAssetCache && typeof window.FinalBdayAssetCache.getText === 'function'
                    ? window.FinalBdayAssetCache.getText('pages/app_principal.html')
                    : '';

                let pageHtml = cachedPageHtml;
                if (!pageHtml) {
                    const pageResponse = await fetch('pages/app_principal.html', { cache: 'no-store' });
                    if (!pageResponse.ok) {
                        throw new Error('No se pudo leer pages/app_principal.html (' + pageResponse.status + ')');
                    }

                    pageHtml = await pageResponse.text();
                }

                const principalStyle = extractPrincipalStyle(pageHtml);
                if (principalStyle) {
                    const styleTag = document.createElement('style');
                    styleTag.id = 'principal-inline-style';
                    styleTag.textContent = principalStyle.replace(/\.\.\/assets\//g, 'assets/');
                    document.head.appendChild(styleTag);
                }

                const principalScript = extractPrincipalInlineScript(pageHtml);
                if (!principalScript) {
                    throw new Error('No se pudo extraer el script principal de la app.');
                }

                const runnableScript = transformPrincipalScript(principalScript);
                // eslint-disable-next-line no-new-func
                const run = new Function(runnableScript);
                await run();
                principalAppReady = true;
            })();

            return principalInitPromise;
        }

        function enterIntro() {
            loaderPage.classList.add('is-hidden');
            introView.classList.add('is-active');
            appReady = true;
            startIntroBirdsMusic();
        }

        function transitionToPrincipal() {
            if (!principalAppReady) return;
            principalView.classList.add('is-active');
            introView.classList.remove('is-active');
        }

        function iniciarTransicionIntro() {
            if (!appReady) return;

            if (startMusicTimeoutId !== null) {
                clearTimeout(startMusicTimeoutId);
            }
            startMusicTimeoutId = setTimeout(() => {
                startGlobalBackgroundMusic();
                startMusicTimeoutId = null;
            }, 5000);

            startIntroBirdsMusic();

            introOverlay.style.display = 'none';
            introBgVideo.style.display = 'none';
            introTransitionVideo.style.display = 'block';
            introTransitionVideo.muted = true;
            introTransitionVideo.volume = 0;
            introTransitionVideo.play().catch(() => {});

            setTimeout(() => {
                transitionToPrincipal();
            }, 6500);
        }

        async function boot() {
            try {
                const totalCustoms = getCustomsTotal();
                const minVisibleCount = Math.max(1, Math.round(totalCustoms * 0.01));
                let loadedCustoms = 0;
                let simulatedCustoms = minVisibleCount;
                let simulationLockedToReal = false;
                let simulationTimerId = null;
                const bootStartAt = performance.now();

                function getShownCustoms() {
                    return simulationLockedToReal
                        ? Math.max(minVisibleCount, loadedCustoms)
                        : Math.max(minVisibleCount, loadedCustoms, simulatedCustoms);
                }

                function stopSimulation() {
                    if (simulationTimerId !== null) {
                        clearInterval(simulationTimerId);
                        simulationTimerId = null;
                    }
                    simulationLockedToReal = true;
                }

                updateProgress(getShownCustoms(), totalCustoms, 'Invitados disfrazándose...');

                simulationTimerId = setInterval(() => {
                    if (simulationLockedToReal) return;
                    if (simulatedCustoms < totalCustoms - 1) {
                        simulatedCustoms += 1;
                    }

                    if (loadedCustoms >= simulatedCustoms) {
                        stopSimulation();
                    }

                    updateProgress(getShownCustoms(), totalCustoms, 'Invitados disfrazándose...');
                }, 2000);

                await preloadAppResources({
                    onCustomLoaded: () => {
                        loadedCustoms += 1;

                        if (!simulationLockedToReal && loadedCustoms >= simulatedCustoms) {
                            stopSimulation();
                        }

                        updateProgress(getShownCustoms(), totalCustoms, 'Cargando customs...');
                    }
                });

                stopSimulation();

                const elapsedMs = performance.now() - bootStartAt;
                const waitRemainingMs = POST_LOAD_WAIT_MS - elapsedMs;
                if (waitRemainingMs > 0) {
                    updateProgress(getShownCustoms(), totalCustoms, 'Ajustando escenario...');
                    await waitMs(waitRemainingMs);
                }

                updateProgress(
                    getShownCustoms(),
                    totalCustoms,
                    loadedCustoms >= totalCustoms
                        ? 'Todo listo. Entrando en intro...'
                        : 'Carga inicial completa. Reintentando recursos pendientes en segundo plano...'
                );
                setTimeout(enterIntro, 250);
            } catch (error) {
                statusText.classList.add('error');
                statusText.textContent = 'Error de precarga parcial. Continuamos con inicio inmediato...';
                console.error(error);
                setTimeout(enterIntro, 500);
            }
        }

        btnStart.addEventListener('click', iniciarTransicionIntro);
        window.addEventListener('DOMContentLoaded', boot);
    </script>
</body>
</html>
