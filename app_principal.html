<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- Carga de estilos de Swiper.js para el slider táctil -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    
    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100dvh; 
            overflow: hidden; 
            background: #000; 
        }
        
        .container { 
            position: relative; 
            width: 100vw; 
            height: 100dvh; 
        }
        
        /* Vídeo de fondo general de la app */
        #app-bg-video { 
            position: absolute; 
            top: 0; 
            left: 50%; 
            transform: translateX(-50%); 
            height: 100dvh; 
            width: auto; 
            z-index: 0; 
        }

        /* CONTENEDOR DEL SWIPER */
        .swiper {
            position: absolute;
            top: 80px;
            left: 0;
            width: 100%;
            height: auto;
            padding: 10px 0; 
            z-index: 2;
        }

        /* Cada tarjeta del carrusel */
        .swiper-slide {
            width: 40vw;
            height: 40vw;
            max-width: 350px;
            max-height: 350px;
            min-width: 280px;
            min-height: 280px;
            background: rgba(0, 0, 0, 0.5);
            border: 4px solid #555; 
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            transition: transform 0.3s ease, border-color 0.3s ease;
            box-sizing: border-box;
            overflow: hidden; /* Evita que el vídeo del custom se salga del recuadro */
        }

        /* Solo la tarjeta central/activa tiene el borde animado */
        .swiper-slide-active {
            border: 4px solid #ffcc00;
            animation: border-dance 2s infinite linear;
            transform: scale(1.05); 
        }

        /* Estilos tanto para imágenes como para vídeos dentro de la tarjeta */
        .swiper-slide img,
        .swiper-slide video.custom-media { 
            width: 100%; 
            height: 100%; 
            object-fit: contain; 
            opacity: 88%;
        }

        /* CONTENEDORES LED COMPLETO */
        .marquee-container {
            position: absolute;
            bottom: 0;
            width: 100%;
            overflow: hidden;
            background: #000;
            z-index: 2;
            height: 40px;
            opacity: 80%;
            display: flex; 
        }

        /* Ocultamos el letrero LED en las tarjetas laterales */
        .swiper-slide:not(.swiper-slide-active) .marquee-container {
            display: none;
        }

        .marquee-text {
            display: inline-flex;
            white-space: nowrap; 
            animation: marquee infinite 8s linear; 
            font-family: 'Helvetica', sans-serif;
            color: #ff0505;
            font-size: 25px;
            z-index: 5;
            position: relative;
            align-items: center;
            height: 100%;
        }

        .marquee-text span {
            margin-inline: 12px; 
        }
        
        .crt-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
            background: linear-gradient(
                rgba(18, 16, 16, 0) 50%, 
                rgba(0, 0, 0, 0.5) 50%
            );
            background-size: 100% 4px;
        }
        
        @keyframes marquee {
            0% { transform: translate(3d(0, 0, 0)); }
            100% { transform: translate3d(-100%, 0, 0); }
        }

        @keyframes border-dance {
            0% { border-color: #ffcc00; }
            50% { border-color: #ff00ff; }
            100% { border-color: #ffcc00; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Vídeo de fondo principal -->
        <video autoplay muted loop playsinline id="app-bg-video">
            <source src="disco_movil.mp4" media="(max-width: 768px)">
            <source src="disco_movil.mp4" media="(min-width: 769px)">
        </video>
        
        <!-- CARRUSEL TIPO TINDER -->
        <div class="swiper">
            <div class="swiper-wrapper" id="slides-wrapper">
                <!-- Las tarjetas dinámicas se inyectarán aquí con JS -->
            </div>
        </div>
    </div>

    <!-- Script de Swiper.js -->
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <script>
        // CONFIGURACIÓN: He añadido la extensión (file) para soportar mp4 o png fluidamente
        const customsData = {
            1: { year: "2013", theme: "Enfermera sexy" },
            2: { year: "2015", theme: "Chueca esos 5" },
            3: { year: "2023", theme: "Jubilada" },
            4: { year: "2022", theme: "Gernika" },
            5: { year: "2013", theme: "Manicomio" },
            6: { year: "2013", theme: "Kurt Cobain" },
            7: { year: "2013", theme: "Britney Spears" },
            8: { year: "2013", theme: "Freddy Mercury" },
            9: { year: "2013", theme: "La Pantoja" },
            10: { year: "2013", theme: "Aretha Franklin" },
            11: { year: "2015", theme: "Havenido de América" },
            12: { year: "2017", theme: "Genio" },
            13: { year: "2017", theme: "Aladdin" },
            14: { year: "2017", theme: "Darla (Buscando a Nemo)" },
            15: { year: "2017", theme: "Beetlejuice" },
            16: { year: "2018", theme: "E.T." },
            17: { year: "2018", theme: "Albert Rivera cibernético" },
            18: { year: "2017", theme: "Hora de aventuras" }
        };

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }
    
        const order = shuffleArray(Object.keys(customsData).map(Number));
        const wrapper = document.getElementById('slides-wrapper');

        order.forEach((id) => {
            const slide = document.createElement('div');
            slide.className = 'swiper-slide';
            
            const file = customsData[id].file;
            let mediaHTML = '';

            // COMPROBACIÓN: Si el archivo termina en .mp4 renderiza etiqueta de vídeo, si no, una imagen
            if (file.endsWith('.mp4')) {
                mediaHTML = `<video class="custom-media" autoplay muted loop playsinline src="customs/${file}"></video>`;
            } else {
                mediaHTML = `<img src="customs/${file}" alt="Custom">`;
            }
            
            const textHTML = `<span>${customsData[id].year}</span> | <span>${customsData[id].theme}</span> &nbsp;&nbsp;*&nbsp;&nbsp;`;
            
            slide.innerHTML = `
                ${mediaHTML}
                <div class="marquee-container">
                    <div class="crt-overlay"></div>
                    <div class="marquee-text">${textHTML}</div>
                    <div class="marquee-text" aria-hidden="true">${textHTML}</div>
                </div>
            `;
            wrapper.appendChild(slide);
        });

        // Inicializamos Swiper
        const swiper = new Swiper('.swiper', {
            slidesPerView: 'auto',      
            centeredSlides: true,       
            spaceBetween: 25,           
            loop: true,                 
            grabCursor: true,           
        });
    </script>
</body>
</html>
