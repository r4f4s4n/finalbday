<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Principal</title>
    <style>
        /* Reseteo básico para pantalla completa */
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
        
        .container { position: relative; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; }

        /* Vídeo de fondo: Aseguramos que ocupe todo y esté detrás */
        #app-bg-video { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            object-fit: cover; z-index: -1; 
        }

        /* Contenedor del cuadrado 1x1 */
        .custom-card {
            width: 80vw; height: 80vw; max-width: 300px; max-height: 300px;
            border: 4px solid #ffcc00;
            background: rgba(0,0,0,0.3);
            display: flex; justify-content: center; align-items: center;
            animation: border-dance 2s infinite linear;
            z-index: 1; /* Encima del video */
            cursor: pointer;
        }

        .custom-card img { width: 90%; height: 90%; object-fit: contain; }

        @keyframes border-dance {
            0% { border-color: #ffcc00; }
            50% { border-color: #ff00ff; }
            100% { border-color: #ffcc00; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Vídeo de fondo -->
        <video autoplay muted loop playsinline id="app-bg-video">
            <source src="disco_movil.mp4" media="(max-width: 768px)">
            <source src="disco_escritorio.mp4" media="(min-width: 769px)">
        </video>

        <!-- Contenedor del Custom -->
        <div class="custom-card" id="card">
            <img id="custom-img" src="customs/custom1.png" alt="Custom">
        </div>
    </div>

    <script>
        let currentIndex = 1;
        const totalImages = 5; // Asegúrate de ajustar este número

        document.getElementById('card').addEventListener('click', () => {
            currentIndex = (currentIndex % totalImages) + 1;
            document.getElementById('custom-img').src = `customs/custom${currentIndex}.png`;
        });
    </script>
</body>
</html>
