<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- Carga de estilos de Swiper.js para el slider táctil -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    
    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100dvh; 
            overflow: hidden; 
            background: #000; 
        }
        
        .container { 
            position: relative; 
            width: 100vw; 
            height: 100dvh; 
        }
        
        video { 
            position: absolute; 
            top: 0; 
            left: 50%; 
            transform: translateX(-50%); 
            height: 100dvh; 
            width: auto; 
            z-index: 0; 
        }

        /* CONTENEDOR DEL SWIPER (Ocupa la parte superior) */
        .swiper {
            position: absolute;
            top: 80px;
            left: 0;
            width: 100%;
            height: auto;
            padding: 10px 0; /* Espacio para que se vea el glow de los bordes */
            z-index: 2;
        }

        /* Cada tarjeta del carrusel */
        .swiper-slide {
            width: 40vw;
            height: 40vw;
            max-width: 350px;
            max-height: 350px;
            min-width: 280px;
            min-height: 280px;
            background: rgba(0, 0, 0, 0.5);
            border: 4px solid #555; /* Tarjetas inactivas en gris sutil */
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            transition: transform 0.3s ease, border-color 0.3s ease;
            box-sizing: border-box;
        }

        /* Solo la tarjeta central/activa tiene el borde animado y resalta */
        .swiper-slide-active {
            border: 4px solid #ffcc00;
            animation: border-dance 2s infinite linear;
            transform: scale(1.05); /* Ligeramente más grande */
        }

        .swiper-slide img { 
            width: 100%; 
            height: 100%; 
            object-fit: contain; 
            opacity: 88%;
        }

        /* CONTENEDORES LED (Dentro de cada slide para que se muevan con él) */
        .marquee-container {
            position: absolute;
            bottom: 0;
            width: 100%;
            overflow: hidden;
            background: #000;
            z-index: 2;
            height: 40px;
            opacity: 80%;
        }

        /* Ocultamos el letrero LED en las tarjetas laterales para no saturar la vista */
        .swiper-slide:not(.swiper-slide-active) .marquee-container {
            display: none;
        }

        .marquee-text {
            display: inline-flex;
            padding-left: 100%;
            animation: marquee 8s linear infinite;
            font-family: 'Helvetica', cursive;
            color: #ff0505;
            font-size: 25px;
            z-index: 5;
            position: relative;
            margin-top: 1%;
            min-width: 280px;
        }

        .marquee-text span {
            margin-inline: 6px;
        }
        
        .crt-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
            background: linear-gradient(
                rgba(18, 16, 16, 0) 50%, 
                rgba(0, 0, 0, 0.5) 50%
            );
            background-size: 100% 4px;
        }
        
        @keyframes marquee {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-100%, 0); }
        }

        @keyframes border-dance {
            0% { border-color: #ffcc00; }
            50% { border-color: #ff00ff; }
            100% { border-color: #ffcc00; }
        }
    </style>
</head>
<body>
    <div class="container">
        <video autoplay muted loop playsinline id="app-bg-video">
            <source src="disco_movil.mp4" media="(max-width: 768px)">
            <source src="disco_movil.mp4" media="(min-width: 769px)">
        </video>
        
        <!-- CARRUSEL TIPO TINDER -->
        <div class="swiper">
            <div class="swiper-wrapper" id="slides-wrapper">
                <!-- Las tarjetas dinámicas se inyectarán aquí con JS -->
            </div>
        </div>
    </div>

    <!-- Script de Swiper.js -->
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <script>
        const customsData = {
            1: { year: "2013", theme: "Enfermera sexy" },
            2: { year: "2015", theme: "Chueca esos 5" },
            3: { year: "2023", theme: "Abuela camella" },
            4: { year: "2022", theme: "Gernika" },
            5: { year: "2013", theme: "Manicomio" },
            6: { year: "2013", theme: "Kurt Cobain" },
            7: { year: "2013", theme: "Britney Spears" },
            8: { year: "2013", theme: "Freddy Mercury" },
            9: { year: "2013", theme: "La Pantoja" },
            10: { year: "2013", theme: "Aretha Franklin" },
            11: { year: "2015", theme: "Havenido de América" },
            12: { year: "2017", theme: "Genio" },
            13: { year: "2017", theme: "Aladdin" },
            14: { year: "2017", theme: "Darla (Buscando a Nemo)" },
            15: { year: "2017", theme: "Beetlejuice" },
            16: { year: "2018", theme: "E.T." },
            17: { year: "2018", theme: "Albert Rivera" },
            18: { year: "2017", theme: "Hora de aventuras" }
        };

        // Función para barajar un array
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }
    
        // Generamos el orden aleatorio de las imágenes
        const order = shuffleArray(Object.keys(customsData).map(Number));
        const wrapper = document.getElementById('slides-wrapper');

        // Construimos las tarjetas dinámicamente en el DOM respetando el orden aleatorio
        order.forEach((id) => {
            const slide = document.createElement('div');
            slide.className = 'swiper-slide';
            slide.innerHTML = `
                <img src="customs/custom${id}.png" alt="Custom">
                <div class="marquee-container">
                    <div class="crt-overlay"></div>
                    <div class="marquee-text">
                        <span>${customsData[id].year}</span> | <span>${customsData[id].theme}</span>
                    </div>
                </div>
            `;
            wrapper.appendChild(slide);
        });

        // Inicializamos Swiper con efecto de enfoque central
        const swiper = new Swiper('.swiper', {
            slidesPerView: 'auto',      // Permite que las tarjetas midan lo que dice el CSS
            centeredSlides: true,       // La tarjeta activa se queda en el centro
            spaceBetween: 25,           // Distancia entre tarjetas (asoma la anterior/siguiente)
            loop: true,                 // Carrusel infinito al llegar al final
            grabCursor: true,           // Muestra mano en PC para arrastrar
        });
    </script>
</body>
</html>
