<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- Carga de estilos de Swiper.js para el slider táctil -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    
    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100dvh; 
            overflow: hidden; 
            background: #000; 
        }
        
        .container { 
            position: relative; 
            width: 100vw; 
            height: 100dvh; 
        }
        
        /* Vídeo de fondo general de la app */
        #app-bg-video { 
            position: absolute; 
            top: 0; 
            left: 50%; 
            transform: translateX(-50%); 
            height: 100dvh; 
            width: auto; 
            z-index: 0; 
        }

        /* DADO ARCADE BLANCO EN LA ESQUINA SUPERIOR DERECHA */
        .dice-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 46px;
            height: 46px;
            z-index: 20; /* Por encima de todo */
            background: #ffffff; /* Blanco normal */
            border: 4px solid #000000; /* Borde negro grueso retro */
            box-shadow: 4px 4px 0px #000000; /* Sombra pixelada negra */
            border-radius: 4px; /* Esquinas casi cuadradas tipo pixel */
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.1s ease, box-shadow 0.1s ease;
            box-sizing: border-box;
        }

        .dice-btn:active {
            transform: scale(0.9) translate(2px, 2px);
            box-shadow: 1px 1px 0px #000;
        }

        /* Contenedor del SVG para centrar los puntos del dado */
        .dice-btn svg {
            width: 24px;
            height: 24px;
        }

        /* Animación de agitación estilo retro al clicar */
        .shake-dice {
            animation: dice-shake 0.5s ease-in-out;
        }

        @keyframes dice-shake {
            0% { transform: rotate(0deg) scale(1); }
            20% { transform: rotate(-20deg) scale(1.1); }
            40% { transform: rotate(25deg) scale(1.1); }
            60% { transform: rotate(-15deg) scale(1.1); }
            80% { transform: rotate(15deg) scale(1.1); }
            100% { transform: rotate(0deg) scale(1); }
        }

        /* CONTENEDOR DEL SWIPER */
        .swiper {
            position: absolute;
            top: 80px;
            left: 0;
            width: 100%;
            height: auto;
            padding: 10px 0; 
            z-index: 2;
        }

        /* Cada tarjeta del carrusel */
        .swiper-slide {
            width: 40vw;
            height: 40vw;
            max-width: 350px;
            max-height: 350px;
            min-width: 280px;
            min-height: 280px;
            background: rgba(0, 0, 0, 0.5);
            border: 4px solid #555; 
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            transition: transform 0.3s ease, border-color 0.3s ease;
            box-sizing: border-box;
            overflow: hidden; 
        }

        /* Solo la tarjeta central/activa tiene el borde animado */
        .swiper-slide-active {
            border: 4px solid #ffcc00;
            animation: border-dance 2s infinite linear;
            transform: scale(1.05); 
        }

        /* Estilos compartidos para imágenes y vídeos del custom */
        .swiper-slide img,
        .swiper-slide video.custom-media { 
            width: 100%; 
            height: 100%; 
            object-fit: contain; 
            opacity: 88%;
        }

        /* CONTENEDORES LED COMPLETO */
        .marquee-container {
            position: absolute;
            bottom: 0;
            width: 100%;
            overflow: hidden;
            background: #000;
            z-index: 2;
            height: 40px;
            opacity: 80%;
            display: flex; 
        }

        /* Ocultamos el letrero LED en las tarjetas laterales */
        .swiper-slide:not(.swiper-slide-active) .marquee-container {
            display: none;
        }

        .marquee-text {
            display: inline-flex;
            white-space: nowrap; 
            animation: marquee infinite 8s linear; 
            font-family: 'Helvetica', sans-serif;
            color: #ff0505;
            font-size: 25px;
            z-index: 5;
            position: relative;
            align-items: center;
            height: 100%;
        }

        .marquee-text span {
            margin-inline: 12px; 
        }
        
        .crt-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
            background: linear-gradient(
                rgba(18, 16, 16, 0) 50%, 
                rgba(0, 0, 0, 0.5) 50%
            );
            background-size: 100% 4px;
        }
        
        @keyframes marquee {
            0% { transform: translate3d(0, 0, 0); }
            100% { transform: translate3d(-100%, 0, 0); }
        }

        @keyframes border-dance {
            0% { border-color: #ffcc00; }
            50% { border-color: #ff00ff; }
            100% { border-color: #ffcc00; }
        }
    </style>
</head>

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }
    
        const order = shuffleArray(Object.keys(customsData).map(Number));
        const wrapper = document.getElementById('slides-wrapper');
    
        order.forEach((id) => {
            if (!customsData[id]) return;
    
            const slide = document.createElement('div');
            slide.className = 'swiper-slide';
            
            const file = customsData[id].file || `custom${id}.png`;
            let mediaHTML = '';
    
            if (file && file.endsWith('.mp4')) {
                mediaHTML = `<video class="custom-media" autoplay muted loop playsinline src="customs/${file}"></video>`;
            } else {
                mediaHTML = `<img src="customs/${file}" alt="Custom">`;
            }
            
            const textHTML = `<span>${customsData[id].year}</span> | <span>${customsData[id].theme}</span> &nbsp;&nbsp;*&nbsp;&nbsp;`;
            
            slide.innerHTML = `
                ${mediaHTML}
                <div class="marquee-container">
                    <div class="crt-overlay"></div>
                    <div class="marquee-text">${textHTML}</div>
                    <div class="marquee-text" aria-hidden="true">${textHTML}</div>
                </div>
            `;
            wrapper.appendChild(slide);
        });
    
        // Inicializamos Swiper
        const swiper = new Swiper('.swiper', {
            slidesPerView: 'auto',      
            centeredSlides: true,       
            spaceBetween: 25,           
            loop: true,                 
            grabCursor: true,           
        });

        // LÓGICA DEL DADO
        const diceBtn = document.getElementById('random-dice');

            const randomSlideIndex = Math.floor(Math.random() * order.length);
            swiper.slideToLoop(randomSlideIndex, 600); 

            setTimeout(() => {
                diceBtn.classList.remove('shake-dice');
            }, 500);
        });
