<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Principal</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
        .container { position: relative; width: 100vw; height: 100vh; }
        
        #app-bg-video { 
            position: absolute; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            object-fit: cover; 
            z-index: 1; /* Forzamos que esté por encima de cualquier fondo negro */
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Añadimos 'preload="auto"' para que cargue el vídeo antes de mostrarse -->
        <video autoplay muted loop playsinline preload="auto" id="app-bg-video">
            <source src="disco_movil.mp4" type="video/mp4">
        </video>
    </div>
</body>
</html>
