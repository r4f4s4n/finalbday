<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- Carga de estilos de Swiper.js para el slider táctil -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    
    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100dvh; 
            overflow: hidden; 
            background: #000; 
        }
        
        .container { 
            position: relative; 
            width: 100vw; 
            height: 100dvh; 
        }
        
        /* Vídeo de fondo general de la app */
        #app-bg-video { 
            position: absolute; 
            top: 0; 
            left: 50%; 
            transform: translateX(-50%); 
            height: 100dvh; 
            width: auto; 
            z-index: 0; 
            transition: opacity 0.5s ease;
        }

        /* PANTALLA DE CARGA RETRO TRANSLÚCIDA */
        .arcade-loader-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100dvh;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(3px);
            -webkit-backdrop-filter: blur(3px);
            z-index: 200;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            transition: opacity 0.5s ease, visibility 0.5s ease;
            pointer-events: all;
        }

        .arcade-loader-text {
            color: #ff00ff;
            font-family: 'Helvetica', sans-serif;
            font-weight: 900;
            font-size: 32px;
            text-shadow: 3px 3px 0px #000, 0 0 10px #ff00ff;
            text-transform: uppercase;
            letter-spacing: 4px;
            animation: arcade-blink 0.8s steps(2, start) infinite;
        }

        @keyframes arcade-blink {
            to { visibility: hidden; }
        }

        /* DESPLEGABLE ARCADE 8-BITS EN LA ESQUINA SUPERIOR IZQUIERDA */
        .arcade-select-container {
            position: absolute;
            top: 15px;
            left: 15px;
            z-index: 30; 
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }

        .arcade-select {
            background: #ff00ff; 
            color: #ffffff;
            font-family: 'Helvetica', sans-serif;
            font-weight: bold;
            font-size: 14px;
            border: 4px solid #000000;
            box-shadow: 4px 4px 0px #000000;
            padding: 8px 12px;
            border-radius: 4px;
            outline: none;
            cursor: pointer;
            text-shadow: 1px 1px 0px #000;
            width: 120px;
        }

        .arcade-select option {
            background: #000000;
            color: #ff00ff;
        }

        /* DADO ARCADE BLANCO EN LA ESQUINA SUPERIOR DERECHA */
        .dice-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 46px;
            height: 46px;
            z-index: 20; 
            background: #ffffff; 
            border: 4px solid #000000; 
            box-shadow: 4px 4px 0px #000000; 
            border-radius: 4px; 
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.1s ease, box-shadow 0.1s ease, opacity 0.5s ease;
            box-sizing: border-box;
            opacity: 0;
            pointer-events: none;
        }

        .dice-btn:active {
            transform: scale(0.9) translate(2px, 2px);
            box-shadow: 1px 1px 0px #000;
        }

        .dice-btn svg {
            width: 24px;
            height: 24px;
        }

        /* Animación de agitación */
        .shake-dice {
            animation: dice-shake 0.5s ease-in-out;
        }

        @keyframes dice-shake {
            0% { transform: rotate(0deg) scale(1); }
            20% { transform: rotate(-20deg) scale(1.1); }
            40% { transform: rotate(25deg) scale(1.1); }
            60% { transform: rotate(-15deg) scale(1.1); }
            80% { transform: rotate(15deg) scale(1.1); }
            100% { transform: rotate(0deg) scale(1); }
        }

        /* CONTENEDOR DEL SWIPER */
        .swiper {
            position: absolute;
            top: 80px;
            left: 0;
            width: 100%;
            height: auto;
            padding: 10px 0; 
            z-index: 2;
            display: none;
            opacity: 0; 
            pointer-events: none; 
            transition: opacity 0.5s ease; 
        }

        /* Cada tarjeta del carrusel */
        .swiper-slide {
            width: 40vw;
            height: 40vw;
            max-width: 350px;
            max-height: 350px;
            min-width: 280px;
            min-height: 280px;
            background: rgba(0, 0, 0, 0.5);
            border: 4px solid #555; 
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            transition: transform 0.3s ease, border-color 0.3s ease;
            box-sizing: border-box;
            overflow: hidden; 
            cursor: pointer;
        }

        /* Solo la tarjeta central/activa tiene el borde animado */
        .swiper-slide-active {
            border: 7px solid #ffcc00;
            animation: border-dance 3s infinite linear;
            transform: scale(1.05); 
        }

        .swiper-slide img,
        .swiper-slide video.custom-media { 
            width: 100%; 
            height: 100%; 
            object-fit: contain; 
            opacity: 88%;
        }

        /* CONTENEDORES LED COMPLETO */
        .marquee-container {
            position: absolute;
            bottom: 0;
            width: 100%;
            overflow: hidden;
            background: #000;
            z-index: 2;
            height: 40px;
            opacity: 80%;
            display: flex; 
        }

        /* Ocultamos el letrero LED en las tarjetas laterales */
        .swiper-slide:not(.swiper-slide-active) .marquee-container {
            display: none;
        }

        .marquee-text {
            display: inline-flex;
            white-space: nowrap; 
            animation: marquee infinite 8s linear; 
            font-family: 'Helvetica', sans-serif;
            color: #ff0505;
            font-size: 25px;
            z-index: 5;
            position: relative;
            align-items: center;
            height: 100%;
        }

        .marquee-text span {
            margin-inline: 12px; 
        }
        
        .crt-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
            background: linear-gradient(
                rgba(18, 16, 16, 0) 50%, 
                rgba(0, 0, 0, 0.5) 50%
            );
            background-size: 100% 4px;
        }
        
        @keyframes marquee {
            0% { transform: translate3d(0, 0, 0); }
            100% { transform: translate3d(-100%, 0, 0); }
        }

        @keyframes border-dance {
            0% { border-color: #ffcc00; }
            50% { border-color: #ff00ff; }
            100% { border-color: #ffcc00; }
        }

        /* VISTA GRID DE MINIATURAS */
        .grid-view {
            display: none; 
            position: absolute;
            top: 80px;
            left: 5%;
            width: 90%;
            height: calc(100dvh - 120px);
            overflow-y: auto;
            z-index: 15;
            background: rgba(0, 0, 0, 0.85);
            border: 4px solid #ff00ff;
            box-sizing: border-box;
            padding: 15px;
            border-radius: 6px;
            box-shadow: 0px 0px 15px #ff00ff;
        }

        .grid-view::-webkit-scrollbar {
            width: 6px;
        }
        .grid-view::-webkit-scrollbar-thumb {
            background: #ffcc00;
            border-radius: 4px;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(70px, 1fr));
            gap: 12px;
            justify-content: center;
        }

        .grid-item {
            aspect-ratio: 1 / 1;
            background: rgba(0,0,0,0.6);
            border: 3px solid #ffcc00;
            box-shadow: 2px 2px 0px #000;
            border-radius: 4px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            cursor: pointer;
            box-sizing: border-box;
            transition: transform 0.1s ease, border-color 0.1s;
        }

        .grid-item:hover, .grid-item:active {
            border-color: #ff00ff;
            transform: scale(1.1);
        }

        .grid-item img,
        .grid-item video {
            width: 100%;
            height: 100%;
            object-fit: cover; 
        }

        /* DIALOG DE CONFIRMACIÓN ESTILO STREET FIGHTER 8-BIT */
        .arcade-dialog-overlay {
            display: none; 
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100dvh;
            background: rgba(0, 0, 0, 0.85);
            z-index: 100; 
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
        }

        .arcade-dialog-box {
            background: #111111;
            border: 6px double #ff00ff; 
            box-shadow: 0 0 25px #ff00ff, inset 0 0 10px #ff00ff;
            padding: 30px 20px;
            width: 85%;
            max-width: 400px;
            text-align: center;
            box-sizing: border-box;
            border-radius: 4px;
            animation: dialog-pop 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes dialog-pop {
            from { transform: scale(0.7); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .arcade-dialog-text {
            color: #ffffff;
            font-family: 'Helvetica', sans-serif;
            font-size: 18px;
            font-weight: bold;
            line-height: 1.5;
            margin: 0 0 30px 0;
            text-shadow: 2px 2px 0px #000000;
            text-transform: uppercase; 
        }

        .arcade-dialog-text span {
            color: #ffcc00; 
            text-shadow: 2px 2px 0px #000000;
        }

        .arcade-dialog-buttons {
            display: flex;
            justify-content: space-around;
            gap: 20px;
        }

        .arcade-btn {
            flex: 1;
            padding: 12px 20px;
            font-family: 'Helvetica', sans-serif;
            font-weight: bold;
            font-size: 18px;
            border: 4px solid #000000;
            border-radius: 4px;
            cursor: pointer;
            box-shadow: 4px 4px 0px #000000;
            transition: transform 0.1s, box-shadow 0.1s;
            text-transform: uppercase;
        }

        .arcade-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 1px 1px 0px #000000;
        }

        .btn-no {
            background: #ff0505; 
            color: #ffffff;
            text-shadow: 1px 1px 0px #000;
        }

        .btn-yes {
            background: #00ff00;
            color: #000000;
        }

        /* PANTALLA DE ÉXTASIS / CONFIRMACIÓN FINAL */
        .final-screen-overlay {
            display: none; 
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100dvh;
            background: rgba(0, 0, 0, 0.75); 
            backdrop-filter: blur(2px);
            -webkit-backdrop-filter: blur(2px);
            z-index: 90;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
            padding: 20px;
            animation: dialog-pop 0.4s ease;
        }

        .arcade-back-container {
            position: absolute;
            top: 15px;
            left: 15px;
            z-index: 95;
        }

        .arcade-back-btn {
            background: #ffcc00;
            color: #000000;
            font-family: 'Helvetica', sans-serif;
            font-weight: bold;
            font-size: 14px;
            border: 4px solid #000000;
            box-shadow: 4px 4px 0px #000000;
            padding: 8px 12px;
            border-radius: 4px;
            outline: none;
            cursor: pointer;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .arcade-back-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 1px 1px 0px #000000;
        }

        .final-text-box {
            background: #111111;
            border: 6px double #00ff00; 
            box-shadow: 0 0 25px #00ff00, inset 0 0 10px #00ff00;
            padding: 25px;
            width: 90%;
            max-width: 450px;

            box-sizing: border-box;
            border-radius: 4px;

            font-family: 'Helvetica', sans-serif;
            font-weight: bold;
            font-size: 16px;
            line-height: 1.6;
            text-shadow: 2px 2px 0px #000000;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        .final-text-box span.highlight {
            color: #ffcc00;
        }

            margin-top: 10px;

            justify-content: center;
            align-items: center;
            overflow: hidden;
            box-sizing: border-box;
        }

            height: 100%;
            object-fit: contain;

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }
    
        const order = shuffleArray(Object.keys(customsData).map(Number));
        const wrapper = document.getElementById('slides-wrapper');

        let totalMediaToLoad = 0;
        let mediaLoadedCount = 0;
        let isAppReady = false; 

        function forceStartApp() {
            if (isAppReady) return;
            isAppReady = true;

            console.log("Iniciando aplicación. Recursos listos.");

            const loader = document.getElementById('arcade-loader');
            loader.style.opacity = '0';
            loader.style.visibility = 'hidden';

            const mainSwiper = document.getElementById('main-swiper');
            mainSwiper.style.display = 'block';
            setTimeout(() => {
                mainSwiper.style.opacity = '1';
                mainSwiper.style.pointerEvents = 'auto';
            }, 50);

            const selectContainer = document.getElementById('select-container');
            const diceBtn = document.getElementById('random-dice');
            selectContainer.style.opacity = '1';
            selectContainer.style.pointerEvents = 'auto';
            diceBtn.style.opacity = '1';
            diceBtn.style.pointerEvents = 'auto';

            swiper.update();
        }

        function checkAllMediaLoaded() {
            if (isAppReady) return;
            mediaLoadedCount++;
            if (mediaLoadedCount >= totalMediaToLoad) {
                forceStartApp();
            }
        }

        setTimeout(() => {
            if (!isAppReady) {
                console.warn("Fusible de carga activado (Timeout). Iniciando aplicación de forma forzada.");
                forceStartApp();
            }
        }, 4000); 
    
        // Construye el nodo DOM de una slide a partir de su id.
        // trackLoad=true sólo se usa en la carga inicial, para saber cuándo ocultar el loader.
        function buildSlideNode(id, { trackLoad = false } = {}) {
            const data = customsData[id];

            const slide = document.createElement('div');
            slide.className = 'swiper-slide';
            slide.setAttribute('data-id', id);

            const file = data.file || `custom${id}.png`;
            const isVideo = file && file.endsWith('.mp4');

            if (trackLoad) totalMediaToLoad++;

            const loadAttrs = trackLoad
                ? (isVideo
                    ? `oncanplaythrough="checkAllMediaLoaded()" onerror="checkAllMediaLoaded()"`
                    : `onload="checkAllMediaLoaded()" onerror="checkAllMediaLoaded()"`)
                : '';

            const mediaHTML = isVideo
                ? `<video class="custom-media" autoplay muted loop playsinline ${loadAttrs} src="customs/${file}"></video>`
                : `<img src="customs/${file}" ${loadAttrs} alt="Custom">`;

            const textHTML = `<span>${data.year}</span> | <span>${data.theme}</span> &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;`;

            slide.innerHTML = `
                ${mediaHTML}
                <div class="marquee-container">
                    <div class="crt-overlay"></div>
                    <div class="marquee-text">${textHTML}</div>
                    <div class="marquee-text" aria-hidden="true">${textHTML}</div>
                </div>
            `;
            return slide;
        }

        order.forEach((id) => {
            if (!customsData[id]) return;
            wrapper.appendChild(buildSlideNode(id, { trackLoad: true }));
        });
    
        const swiper = new Swiper('.swiper', {
            slidesPerView: 'auto',      
            centeredSlides: true,       
            spaceBetween: 25,           
            loop: true,                 
            grabCursor: true,           
        });

        // Ids actualmente mostrados en el slider (todos, o filtrados por categoría/año)
        let currentSwiperIds = order;

        // Reconstruye el contenido del swiper con un nuevo conjunto de ids,
        // respetando el modo loop de Swiper.
        function rebuildSwiperSlides(ids) {
            swiper.loopDestroy();
            wrapper.innerHTML = '';
            ids.forEach(id => {
                if (customsData[id]) {
                    wrapper.appendChild(buildSlideNode(id));
                }
            });
            swiper.update();
            swiper.loopCreate();
            swiper.update();
            currentSwiperIds = ids;
        }

        const select = document.getElementById('year-select');
        const selectOptionsMap = {};
        
        Object.values(customsData).forEach(item => {
            if (!selectOptionsMap[item.year]) {
                selectOptionsMap[item.year] = item.category;
            }
        });

        Object.keys(selectOptionsMap).sort().forEach(year => {
            const option = document.createElement('option');
            option.value = year;
            option.textContent = `${year} - ${selectOptionsMap[year].toUpperCase()}`;
            select.appendChild(option);
        });

        const mainSwiperEl = document.getElementById('main-swiper');
        const mainGridEl = document.getElementById('main-grid');
        const gridWrapper = document.getElementById('grid-wrapper');
        const diceBtn = document.getElementById('random-dice');

        select.addEventListener('change', (e) => {
            const selectedYear = e.target.value;

            if (selectedYear === 'all') {
                mainGridEl.style.display = 'none';
                mainSwiperEl.style.display = 'block';
                diceBtn.style.display = 'flex';
                if (currentSwiperIds !== order) {
                    rebuildSwiperSlides(order);
                }
                swiper.update();
            } else {
                mainSwiperEl.style.display = 'none';
                diceBtn.style.display = 'none';
                mainGridEl.style.display = 'block';

                const filteredCustoms = Object.entries(customsData).filter(([id, data]) => {
                    return data.year === selectedYear;
                });

                gridWrapper.innerHTML = '';
                filteredCustoms.forEach(([id, data]) => {
                    const gridItem = document.createElement('div');
                    gridItem.className = 'grid-item';
                    gridItem.setAttribute('data-target-id', id);

                    const file = data.file || `custom${id}.png`;
                    let mediaHTML = '';

                    if (file && file.endsWith('.mp4')) {
                        mediaHTML = `<video autoplay muted loop playsinline src="customs/${file}"></video>`;
                    } else {
                        mediaHTML = `<img src="customs/${file}" alt="Custom">`;
                    }

                    gridItem.innerHTML = mediaHTML;
                    gridWrapper.appendChild(gridItem);

                    gridItem.addEventListener('click', () => {
                        const targetId = parseInt(id);
                        // Ids de la categoría/año actualmente seleccionada en el grid
                        const categoryIds = filteredCustoms.map(([entryId]) => parseInt(entryId));

                        // El select mantiene el valor de la categoría seleccionada
                        // (ya está en selectedYear), por lo que mostrará su texto.
                        mainGridEl.style.display = 'none';
                        mainSwiperEl.style.display = 'block';
                        diceBtn.style.display = 'flex';

                        rebuildSwiperSlides(categoryIds);

                        const targetSlideIndex = categoryIds.indexOf(targetId);
                        if (targetSlideIndex !== -1) {
                            swiper.slideToLoop(targetSlideIndex, 0);
                        }
                    });
                });
            }
        });

        diceBtn.addEventListener('click', () => {
            diceBtn.classList.add('shake-dice');
            
            const randomSlideIndex = Math.floor(Math.random() * currentSwiperIds.length);
            swiper.slideToLoop(randomSlideIndex, 600);

            setTimeout(() => {
                diceBtn.classList.remove('shake-dice');
            }, 500);
        });

        const confirmDialog = document.getElementById('confirm-dialog');
        const dialogThemeText = document.getElementById('dialog-theme');
        const btnNo = document.getElementById('btn-no');
        const btnYes = document.getElementById('btn-yes');

        const finalScreen = document.getElementById('final-screen');
        const finalPreviewBox = document.getElementById('final-preview-box');
        const btnBack = document.getElementById('btn-back');
        const bgVideo = document.getElementById('app-bg-video');

        swiper.on('click', (s, event) => {
            const clickedActiveSlide = event.target.closest('.swiper-slide-active');
            
            if (clickedActiveSlide) {
                const customId = clickedActiveSlide.getAttribute('data-id');
                const selectedCustom = customsData[customId];

                if (selectedCustom) {
                    dialogThemeText.textContent = selectedCustom.theme;
                    confirmDialog.style.display = 'flex';
                }
            }
        });

        btnNo.addEventListener('click', () => {
            confirmDialog.style.display = 'none';
        });

        btnYes.addEventListener('click', () => {
            confirmDialog.style.display = 'none';

            mainSwiperEl.style.display = 'none';
            mainGridEl.style.display = 'none';
            document.getElementById('select-container').style.opacity = '0';
            document.getElementById('select-container').style.pointerEvents = 'none';
            diceBtn.style.opacity = '0';
            diceBtn.style.pointerEvents = 'none';

            bgVideo.src = "disco_final.mp4";
            bgVideo.load(); 
            bgVideo.play().catch(e => console.log("Auto-play prevenido:", e));

            const activeSlide = document.querySelector('.swiper-slide-active');
            if (activeSlide) {
                const activeMedia = activeSlide.querySelector('.custom-media') || activeSlide.querySelector('img');
                if (activeMedia) {
                    finalPreviewBox.innerHTML = '';
                    const clonedMedia = activeMedia.cloneNode(true);
                    
                    if(clonedMedia.tagName === 'VIDEO') {
                        clonedMedia.muted = true;
                        clonedMedia.loop = true;
                        clonedMedia.playsInline = true;
                        clonedMedia.play().catch(() => {});
                    }
                    finalPreviewBox.appendChild(clonedMedia);
                }
            }

            finalScreen.style.display = 'flex';
        });

        btnBack.addEventListener('click', () => {
            finalScreen.style.display = 'none';

            bgVideo.src = "disco_movil.mp4";
            bgVideo.load();
            bgVideo.play().catch(() => {});

            select.value = 'all'; 
            if (currentSwiperIds !== order) {
                rebuildSwiperSlides(order);
            }
            mainSwiperEl.style.display = 'block';
            mainSwiperEl.style.opacity = '1';
            mainSwiperEl.style.pointerEvents = 'auto';

            document.getElementById('select-container').style.opacity = '1';
            document.getElementById('select-container').style.pointerEvents = 'auto';
            diceBtn.style.opacity = '1';
            diceBtn.style.pointerEvents = 'auto';

            swiper.update();
        });
    </script>
