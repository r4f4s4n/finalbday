<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Principal</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
        #app-bg-video { 
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; 
            object-fit: cover; z-index: 1;
        }
    </style>
</head>
<body>
    <video id="app-bg-video" playsinline autoplay muted loop poster="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7">
        <source src="disco_movil.mp4" type="video/mp4">
    </video>

    <script>
        // Forzar reproducción si el navegador la bloquea
        const video = document.getElementById('app-bg-video');
        window.onload = () => {
            video.play().catch(error => {
                console.log("Autoplay bloqueado, intentando de nuevo...");
                document.body.addEventListener('click', () => video.play(), { once: true });
            });
        };
    </script>
</body>
</html>
