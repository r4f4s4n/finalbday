<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Principal</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
        .container { position: relative; width: 100vw; height: 100vh; }
        video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>
    <div class="container">
       <video autoplay muted loop playsinline id="app-bg-video">
            <source src="disco_movil.mp4" media="(max-width: 768px)">
            <source src="video_escritorio.mp4" media="(min-width: 769px)">
        </video>
    </div>
</body>
</html>
